services:
  smol-brain:
    image: vllm/vllm-openai:latest
    container_name: smol-brain
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Token for gated models (e.g. Llama 3). Set HF_TOKEN in your .env file.
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      # Persistent Hugging Face cache so model weights download only once.
      - hf-cache:/root/.cache/huggingface
    ipc: host
    command:
      - --model
      - ${MODEL}
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION}"
      - --max-model-len
      - "${MAX_MODEL_LEN}"
      - --tensor-parallel-size
      - "${TENSOR_PARALLEL_SIZE}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  hf-cache: