version: '3.8'

x-common: &common
  restart: unless-stopped
  networks:
    - smol-brain

networks:
  smol-brain:
    driver: bridge
    name: smol-brain

volumes:
  hf-cache:
    name: smol-brain-hf-cache
  redis-data:
    name: smol-brain-redis-data

services:
  # --------------------------------------------------------------------------
  # vLLM inference engine (GPU required)
  # --------------------------------------------------------------------------
  smol-brain:
    <<: *common
    image: vllm/vllm-openai:latest
    container_name: smol-brain-vllm
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    command:
      - --model
      - ${MODEL}
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION}"
      - --max-model-len
      - "${MAX_MODEL_LEN}"
      - --tensor-parallel-size
      - "${TENSOR_PARALLEL_SIZE}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    # Expose only internally; gateways connect via network.
    expose:
      - "8000"

  # --------------------------------------------------------------------------
  # Redis (shared cache + rate limiting)
  # --------------------------------------------------------------------------
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: smol-brain-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      # Expose Redis externally only if needed for debugging; gateways connect
      # via the internal network.
      - "6379:6379"

  # --------------------------------------------------------------------------
  # Python gateway (FastAPI + LangChain)
  # --------------------------------------------------------------------------
  python-gateway:
    <<: *common
    build:
      context: ./services/python-gateway
      dockerfile: Dockerfile
    container_name: smol-brain-python-gateway
    environment:
      - GATEWAY_ENVIRONMENT=${GATEWAY_ENVIRONMENT:-production}
      - GATEWAY_LOG_LEVEL=${GATEWAY_LOG_LEVEL:-INFO}
      - GATEWAY_VLLM_BASE_URL=http://smol-brain:8000/v1
      - GATEWAY_VLLM_API_KEY=${GATEWAY_VLLM_API_KEY:-not-needed}
      - GATEWAY_MODEL_NAME=${MODEL}
      - GATEWAY_REDIS_URL=redis://redis:6379/0
      - GATEWAY_CACHE_ENABLED=${GATEWAY_CACHE_ENABLED:-true}
      - GATEWAY_RATE_LIMIT_ENABLED=${GATEWAY_RATE_LIMIT_ENABLED:-true}
      - GATEWAY_RATE_LIMIT_CAPACITY=${GATEWAY_RATE_LIMIT_CAPACITY:-120}
      - GATEWAY_RATE_LIMIT_REFILL_PER_SECOND=${GATEWAY_RATE_LIMIT_REFILL_PER_SECOND:-2.0}
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS}
      - GATEWAY_API_KEY_HEADER=${GATEWAY_API_KEY_HEADER:-X-API-Key}
      - GATEWAY_CORS_ALLOW_ORIGINS=${GATEWAY_CORS_ALLOW_ORIGINS}
      - GATEWAY_WORKERS=${GATEWAY_WORKERS}
      - GATEWAY_WORKER_TIMEOUT=${GATEWAY_WORKER_TIMEOUT:-180}
    # Mount the gateway's own .env file if present (sensitive config).
    env_file:
      - ./services/python-gateway/.env
    depends_on:
      smol-brain:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

